{% extends "layout.html" %}

{% block title %}
Checkout
{% endblock %}

{% block content %}

<div style="padding:40px 16px; background:#f9fafb; min-height:100vh;">

    <div style="max-width:480px; margin:0 auto;">

        <h1 style="font-size:2rem; font-weight:800; color:#111; margin-bottom:20px; text-align:center;">Checkout</h1>

        <div style="background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); padding:20px; margin-bottom:20px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span style="color:#555;">Subtotal</span>
                <span style="font-weight:600;">₹{{ cart.total_price }}</span>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span style="color:#555;">GST (18%)</span>
                <span style="font-weight:600;">₹{{ cart.total_gst }}</span>
            </div>
            <hr style="margin:12px 0; border:none; border-top:1px solid #eee;">
            <div style="display:flex; justify-content:space-between; font-size:1.1rem;">
                <span style="font-weight:800;">Grand Total</span>
                <span style="font-weight:800; color:#15803d;">₹{{ cart.grand_total }}</span>
            </div>
        </div>

        <form method="post" style="background:white; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); padding:20px;">
            {% csrf_token %}

            <h3 style="font-weight:700; color:#111; margin-bottom:14px;">Select Payment Method</h3>

            <label style="display:flex; align-items:center; gap:10px; padding:12px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; cursor:pointer;">
                <input type="radio" name="payment_method" value="COD" checked>
                <span>💵 Cash on Delivery</span>
            </label>

            <label style="display:flex; align-items:center; gap:10px; padding:12px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; cursor:pointer;">
                <input type="radio" name="payment_method" value="UPI">
                <span>📱 UPI</span>
            </label>

            <label style="display:flex; align-items:center; gap:10px; padding:12px; border:1px solid #ddd; border-radius:8px; margin-bottom:20px; cursor:pointer;">
                <input type="radio" name="payment_method" value="CARD">
                <span>💳 Credit/Debit Card</span>
            </label>

            <button type="submit"
                    style="width:100%; background:#111; color:white; font-weight:700; padding:12px; border:none; border-radius:10px; cursor:pointer; font-size:1rem;">
                Place Order
            </button>
        </form>

    </div>
</div>

{% endblock %}
