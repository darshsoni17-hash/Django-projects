{% extends "layout.html" %}

{% block title %}
chai Page
{% endblock %}

{% block content %}
<h1>All chai for you</h1>

<div class="grid grid-cols-3 gap-4 m-4">

{% for chai in chais %}
<div class="bg-blue-500 p-5 rounded">
  <img class="rounded src={{chai.image.url}}" alt="">
  <h3 class="text-2xl font-bold{{chai.name}}</h3>
  <a href="#">
  <button
   type="button"
   class="inline-flex items center block justify center px-4 py-2 border border-trensparent text-sm font-medium rounded-md text-white bg-orange-600 hover:bg-orange-700 focus:outliine-none focus:ring-2 focus:ring-2 focus:ring-offset-2 focus:ring-orange-500"
   >
    {{chai.type}} - {{chai.id}}
  </button>
</div>

{% endfor %}    
</div> 

{% endblock %}
